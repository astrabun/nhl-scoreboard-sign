services:
  nhl-scores-ws:
    image: ghcr.io/astrabun/nhl-scores-ws:latest
    ports:
      - "${NHL_PORT:-8080}:8080"
    restart: unless-stopped

  nhl-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${WEB_PORT:-5000}:5000"
    environment:
      - NHL_TEAM=${NHL_TEAM}
      - NHL_WS_FEED=${NHL_WS_FEED:-ws://nhl-scores-ws:8080}
    depends_on:
      - nhl-scores-ws
    restart: unless-stopped
